packages:
  - .
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true

catalog:
  '@antfu/eslint-config': 9.1.0
  '@eslint-react/eslint-plugin': 5.13.2
  '@sanity/document-internationalization': 6.2.17
  '@sanity/icons': 5.0.0
  '@sanity/structure': 2.36.2
  '@sanity/ui': 3.3.5
  '@sanity/vision': 6.4.0
  '@types/react': 19.2.16
  '@types/styled-components': 5.1.36
  eslint: 10.6.0
  eslint-plugin-react-refresh: ^0.5.3
  netlify-cli: 26.2.0
  react: 19.2.7
  react-dom: 19.2.7
  react-is: 19.2.7
  sanity: 6.4.0
  sanity-plugin-media: 5.0.11
  styled-components: 6.4.3
  typescript: 6.0.3

overrides:
  '@fastify/static': '>=9.1.1'
  brace-expansion: '>=2.0.3'
  js-yaml: '>=3.14.2'
  minimatch: '>=9.0.6'
  path-to-regexp: '>=8.4.0'
  uuid: '>=13.0.1'
  tmp: '>=0.2.6'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@netlify/*'
  - chokidar
  - groq
  - semver
