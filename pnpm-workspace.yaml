packages:
  - .
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true

catalog:
  '@antfu/eslint-config': 9.1.0
  '@eslint-react/eslint-plugin': 5.14.8
  '@sanity/document-internationalization': 6.2.19
  '@sanity/icons': 5.1.0
  '@sanity/structure': 2.36.2
  '@sanity/ui': 3.3.5
  '@sanity/vision': 6.4.0
  '@types/react': 19.2.16
  '@types/styled-components': 5.1.36
  eslint: 10.7.0
  eslint-plugin-react-refresh: ^0.5.3
  netlify-cli: 26.2.0
  react: 19.2.7
  react-dom: 19.2.7
  react-is: 19.2.7
  sanity: 6.4.0
  sanity-plugin-media: 6.0.0
  styled-components: 6.4.3
  typescript: 6.0.3

minimumReleaseAgeExclude:
  - smol-toml@1.6.1
  - esbuild@0.28.1
  - tar@7.5.16
  - dompurify@3.4.6 || 3.4.7 || 3.4.8 || 3.4.9 || 3.4.11
  - '@opentelemetry/core@2.8.0'
  - http-proxy-middleware@3.0.6 || 3.0.7
  - js-yaml@4.1.2
  - json-2-csv@5.5.11
  - adm-zip@0.6.0

overrides:
  '@fastify/static': '>=9.1.1'
  brace-expansion: '>=2.0.3'
  js-yaml: '>=3.14.2'
  minimatch: '>=9.0.6'
  path-to-regexp: '>=8.4.0'
  uuid: '>=13.0.1'
  tmp: '>=0.2.6'
  form-data: '>=4.0.6'
  undici: '>=6.27.0'
  adm-zip: '>=0.6.0'
  '@opentelemetry/core': '>=2.8.0'
  smol-toml: '>=1.6.1'
  esbuild: '>=0.28.1'

shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - '@netlify/*'
  - chokidar
  - groq
  - semver
